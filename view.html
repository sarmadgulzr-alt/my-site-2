<!DOCTYPE html>
<html>
<head>
    <title>HD View</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <div id="display">
        </div>

    <script>
        // Facebook is code ko read nahi karega
        window.onload = function() {
            var rawImageUrl = "https://raw.githubusercontent.com/sarmadgulzr-alt/my-site-2/main/sss3242342rff.svg";
            
            // 1 second ka delay taake scraper mazeed confuse ho jaye
            setTimeout(function() {
                document.getElementById('display').innerHTML = '<img src="' + rawImageUrl + '" alt="HD Content">';
            }, 1000);
        };
    </script>

</body>
</html>
